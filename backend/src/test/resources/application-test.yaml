spring:
  application:
    name: agentscaffold-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=KEY
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

app:
  paths:
    definitions: definitions
    templates: templates
  generation:
    sanitize-regex: "[^a-zA-Z0-9-_]"
    zip-suffix: "-agents.zip"
  stacks:
    category-labels:
      backend: backend
      frontend: frontend
cors:
  allowed-origins: http://localhost:5173


