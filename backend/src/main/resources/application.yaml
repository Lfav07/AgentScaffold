spring:
  application:
    name: agentscaffold
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://localhost:5432/agentscaffold
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  paths:
    definitions: definitions
    templates: templates
  generation:
    sanitize-regex: "[^a-zA-Z0-9-_]"
    zip-suffix: "-agents.zip"
  stacks:
    category-labels:
      backend: backend
      frontend: frontend

cors:
  allowed-origins: ${CORS_ORIGIN:http://localhost:5173}